<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Camel on Quarkus — Integration Services Course</title>

<style>
  :root {
    --bg: #0f172a;
    --bg-sidebar: #0b1120;
    --panel: #1e293b;
    --panel-2: #263449;
    --border: #2e3d55;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #f97316;        /* Camel orange */
    --accent-soft: #fdba74;
    --blue: #4695eb;          /* Quarkus blue */
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --radius: 10px;
    --sidebar-w: 292px;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    line-height: 1.65;
    font-size: 16px;
  }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code { font-family: var(--mono); font-size: 0.88em; background: var(--panel); border: 1px solid var(--border); border-radius: 5px; padding: 0.12em 0.4em; color: var(--accent-soft); }
  pre code { background: none; border: none; padding: 0; color: inherit; font-size: 0.86rem; }
  h1, h2, h3 { line-height: 1.3; }
  h1 { font-size: 1.9rem; margin: 0 0 0.4rem; }
  h2 { font-size: 1.35rem; margin: 2.4rem 0 0.8rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); color: var(--accent-soft); }
  h3 { font-size: 1.08rem; margin: 1.8rem 0 0.6rem; }
  p { margin: 0.8rem 0; }
  ul, ol { padding-left: 1.4rem; }
  li { margin: 0.35rem 0; }
  table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: 0.92rem; }
  th, td { border: 1px solid var(--border); padding: 0.5rem 0.75rem; text-align: left; vertical-align: top; }
  th { background: var(--panel); color: var(--accent-soft); }
  tr:nth-child(even) td { background: rgba(30, 41, 59, 0.5); }

  /* ---------- layout ---------- */
  .layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    position: fixed; top: 0; bottom: 0; left: 0;
    overflow-y: auto;
    padding: 1.2rem 1rem 2rem;
    z-index: 40;
    transition: transform 0.25s ease;
  }
  .main {
    flex: 1;
    margin-left: var(--sidebar-w);
    padding: 2.2rem 2.6rem 5rem;
    max-width: calc(var(--sidebar-w) + 940px);
  }
  .content { max-width: 860px; }

  /* ---------- sidebar ---------- */
  .brand { display: flex; align-items: center; gap: 0.6rem; padding: 0.2rem 0.4rem 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
  .brand-logo { width: 38px; height: 38px; border-radius: 9px; background: linear-gradient(135deg, var(--accent), #c2410c); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
  .brand-title { font-weight: 700; font-size: 0.98rem; line-height: 1.25; }
  .brand-sub { font-size: 0.72rem; color: var(--text-dim); }
  .nav-section { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin: 1.1rem 0.4rem 0.4rem; }
  .nav-link {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.5rem 0.6rem; border-radius: 8px;
    color: var(--text); font-size: 0.9rem;
    margin-bottom: 2px;
  }
  .nav-link:hover { background: var(--panel); text-decoration: none; }
  .nav-link.active { background: rgba(249, 115, 22, 0.14); color: var(--accent-soft); }
  .nav-num {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--border); color: var(--text-dim);
    font-size: 0.72rem; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-weight: 600;
  }
  .nav-link.active .nav-num { border-color: var(--accent); color: var(--accent); }
  .nav-num.done { background: var(--green); border-color: var(--green); color: #052e1f; }
  .progress-wrap { margin: 1.2rem 0.4rem 0; }
  .progress-label { font-size: 0.75rem; color: var(--text-dim); display: flex; justify-content: space-between; margin-bottom: 0.3rem; }
  .progress-bar { height: 7px; background: var(--panel); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 99px; transition: width 0.4s ease; }

  /* ---------- code blocks ---------- */
  .codeblock { margin: 1.1rem 0; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: #1d1f21; }
  .codeblock-bar { display: flex; justify-content: space-between; align-items: center; background: var(--panel); padding: 0.4rem 0.9rem; font-size: 0.76rem; color: var(--text-dim); border-bottom: 1px solid var(--border); font-family: var(--mono); }
  .codeblock-lang { color: var(--accent-soft); text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.68rem; }
  .codeblock pre { margin: 0 !important; padding: 1rem 1.1rem !important; overflow-x: auto; background: transparent !important; }
  .copy-btn { background: none; border: 1px solid var(--border); color: var(--text-dim); font-size: 0.7rem; border-radius: 5px; padding: 0.15rem 0.55rem; cursor: pointer; font-family: inherit; }
  .copy-btn:hover { color: var(--text); border-color: var(--text-dim); }

  /* ---------- callouts ---------- */
  .callout { display: flex; gap: 0.7rem; padding: 0.85rem 1rem; border-radius: var(--radius); margin: 1.1rem 0; font-size: 0.93rem; border: 1px solid; }
  .callout-icon { flex-shrink: 0; }
  .callout.tip { background: rgba(52, 211, 153, 0.08); border-color: rgba(52, 211, 153, 0.35); }
  .callout.warn { background: rgba(251, 191, 36, 0.08); border-color: rgba(251, 191, 36, 0.35); }
  .callout.info { background: rgba(70, 149, 235, 0.08); border-color: rgba(70, 149, 235, 0.35); }

  /* ---------- exercise ---------- */
  .exercise { border: 1px solid rgba(249, 115, 22, 0.4); border-radius: var(--radius); margin: 1.6rem 0; overflow: hidden; }
  .exercise-header { background: rgba(249, 115, 22, 0.12); padding: 0.7rem 1rem; font-weight: 700; color: var(--accent-soft); display: flex; align-items: center; gap: 0.5rem; }
  .exercise-body { padding: 0.2rem 1rem 1rem; }
  .solution-btn { background: var(--accent); color: #1c0a00; border: none; border-radius: 7px; padding: 0.45rem 1rem; font-weight: 700; font-size: 0.85rem; cursor: pointer; margin-top: 0.6rem; }
  .solution-btn:hover { background: var(--accent-soft); }
  .solution-btn.open { background: var(--panel-2); color: var(--text-dim); border: 1px solid var(--border); }

  /* ---------- module chrome ---------- */
  .module-meta { color: var(--text-dim); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }
  .module-lead { color: var(--text-dim); font-size: 1.05rem; margin-top: 0.2rem; }
  .complete-row { display: flex; align-items: center; gap: 1rem; margin: 2.6rem 0 1.4rem; padding: 1rem 1.2rem; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); }
  .complete-btn { border: none; border-radius: 8px; padding: 0.55rem 1.2rem; font-weight: 700; font-size: 0.9rem; cursor: pointer; background: var(--green); color: #052e1f; }
  .complete-btn.undone { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  .pager { display: flex; justify-content: space-between; gap: 1rem; margin-top: 1.4rem; }
  .pager a { flex: 1; border: 1px solid var(--border); border-radius: var(--radius); padding: 0.8rem 1rem; background: var(--panel); color: var(--text); }
  .pager a:hover { border-color: var(--accent); text-decoration: none; }
  .pager .dir { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .pager .next { text-align: right; }

  /* ---------- landing ---------- */
  .hero { text-align: center; padding: 1.5rem 0 0.5rem; }
  .hero h1 { font-size: 2.3rem; background: linear-gradient(90deg, var(--accent-soft), var(--blue)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .hero p { max-width: 640px; margin: 0.8rem auto; color: var(--text-dim); font-size: 1.08rem; }
  .badge-row { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0 0.5rem; }
  .badge { font-size: 0.78rem; padding: 0.25rem 0.8rem; border-radius: 99px; border: 1px solid var(--border); background: var(--panel); color: var(--text-dim); }
  .path-card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 1.4rem; margin: 2rem 0; }
  .path-node { cursor: pointer; }
  .path-node circle.ring { transition: all 0.2s ease; }
  .path-node:hover circle.ring { stroke: var(--accent); stroke-width: 3; }
  .start-btn { display: inline-block; background: var(--accent); color: #1c0a00; font-weight: 800; padding: 0.75rem 1.8rem; border-radius: 10px; font-size: 1rem; margin-top: 0.5rem; }
  .start-btn:hover { background: var(--accent-soft); text-decoration: none; }
  .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 1rem; margin: 2rem 0; }
  .feature { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1.2rem; }
  .feature h3 { margin: 0 0 0.4rem; font-size: 1rem; color: var(--accent-soft); }
  .feature p { margin: 0; font-size: 0.88rem; color: var(--text-dim); }

  /* ---------- misc ---------- */
  .file-tree { font-family: var(--mono); font-size: 0.85rem; background: #1d1f21; border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.2rem; white-space: pre; overflow-x: auto; line-height: 1.5; }
  .menu-btn { display: none; position: fixed; top: 0.8rem; left: 0.8rem; z-index: 50; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 0.4rem 0.7rem; font-size: 1.1rem; cursor: pointer; }
  .scrim { display: none; }
  @media (max-width: 920px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); box-shadow: 0 0 40px rgba(0,0,0,0.6); }
    .main { margin-left: 0; padding: 3.6rem 1.2rem 4rem; }
    .menu-btn { display: block; }
    .scrim.show { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 30; }
  }
</style>

function PathDiagram({
  completed
}) {
  const navigate = useNavigate();
  // snake layout: 4 top (left->right), 4 bottom (right->left)
  const pos = [
    { x: 115, y: 85 }, { x: 305, y: 85 }, { x: 495, y: 85 }, { x: 685, y: 85 },
    { x: 685, y: 235 }, { x: 495, y: 235 }, { x: 305, y: 235 }, { x: 115, y: 235 },
    { x: 115, y: 385 },
  ];
  const nextIdx = MODULES.findIndex(m => !completed.includes(m.slug));
  const segments = [];
  for (let i = 0; i < pos.length - 1; i++) {
    const a = pos[i],
      b = pos[i + 1];
    const done = completed.includes(MODULES[i].slug) && completed.includes(MODULES[i + 1].slug);
    if (a.y === b.y) {
      segments.push({
        d: 'M ' + (a.x + 30) + ' ' + a.y + ' L ' + (b.x - 30) + ' ' + b.y,
        done
      });
    } else {
      segments.push({
        d: 'M ' + a.x + ' ' + (a.y + 30) + ' L ' + b.x + ' ' + (b.y - 30),
